                    containerRef.current.innerHTML = '';

                    mathNode.className = "math-inner";
                    mathNode.innerHTML = '$$' + tex + '$$';
                    containerRef.current.appendChild(mathNode);
                    window.MathJax.typesetPromise([mathNode]).catch(err => console.log(err));
                }
            }, [tex]);
            return (
                <div className="math-scroll-wrapper bg-slate-50 rounded-xl border border-slate-100 mb-4">
                    <div ref={containerRef} className="text-indigo-900" />
                </div>
            );
        };

                    <div>
                        <button onClick={() => setExpanded(!expanded)} className="w-full flex items-center justify-between text-xs font-bold text-gray-500 hover:text-indigo-600 py-2 border-t border-gray-100">
                            <span>អថេរ (Variables)</span><Icons.ChevronDown rotated={expanded} />
                        </button>
                        {expanded && (
                            <ul className="mt-2 space-y-2 text-sm text-gray-600 bg-gray-50 p-3 rounded-lg border border-gray-100">
                                {vars.map((v, i) => {
                                    const [key, val] = v.split('=');
                                    return <li key={i}><span className="font-bold text-indigo-800">{key}</span> <span className="text-gray-400">=</span> {val}</li>
                                })}
                            </ul>
                        )}
                    </div>
                </div>
            );
        };

        const QuizModal = ({ isOpen, onClose, onNext, item }) => {
            if (!isOpen || !item) return null;
            const [revealed, setRevealed] = useState(false);
            useEffect(() => setRevealed(false), [item]);

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
                    <div className="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden relative">
                        <button onClick={onClose} className="absolute top-4 right-4 text-white/70 hover:text-white z-10 text-2xl">✕</button>
                        <div className="bg-gradient-to-r from-blue-600 to-indigo-600 p-6 text-white text-center">
                            <h2 className="text-2xl font-bold brand-font">សំណួរប្រឡង (Quiz)</h2>
                        </div>
                        <div className="p-8">
                            <p className="text-xl font-medium text-gray-800 text-center mb-6">"{item.q}"</p>
                            {revealed ? (
                                <div className="bg-green-50 border border-green-200 rounded-xl p-4 text-center mb-6 overflow-x-auto">
                                    <h3 className="text-green-800 font-bold mb-1">{item.name}</h3>
                                    <MathFormula tex={item.formula} />
                                </div>
                            ) : (
                                <div className="h-20 flex items-center justify-center bg-gray-50 rounded-xl border-2 border-dashed border-gray-200 mb-6 text-gray-400 italic">រូបមន្តត្រូវបានលាក់...</div>
                            )}
                            <div className="flex gap-3">
                                {!revealed ? (
                                    <button onClick={() => setRevealed(true)} className="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg">បង្ហាញចម្លើយ</button>
                                ) : (
                                    <button onClick={onNext} className="flex-1 bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 rounded-xl shadow-lg">សំណួរបន្ទាប់</button>
                                )}
                                <button onClick={onClose} className="px-6 text-gray-500 font-bold hover:text-gray-700">បិទ</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [filter, setFilter] = useState("ទាំងអស់");
            const [search, setSearch] = useState("");
            const [quizOpen, setQuizOpen] = useState(false);
            const [quizItem, setQuizItem] = useState(null);
            
            const filtered = useMemo(() => preloadedData.filter(d => 
                (filter === "ទាំងអស់" || d.tags.includes(filter)) && 
                (d.name.toLowerCase().includes(search.toLowerCase()) || d.formula.toLowerCase().includes(search.toLowerCase()))
            ), [filter, search]);

            const startQuiz = () => {
                setQuizItem(preloadedData[Math.floor(Math.random() * preloadedData.length)]);
                setQuizOpen(true);
            };

            const categories = ["ទាំងអស់", "បរិមាណវិភាគ", "ឧស្ម័ន", "អាតូម", "សូលុយស្យុង", "ទែម៉ូឌីណាមិច", "លំនឹងគីមី", "អាស៊ីតបាស", "អគ្គិសនីគីមី", "ចលនការគីមី", "សភាពរឹង", "នុយក្លេអ៊ែរ", "គីមីសរីរាង្គ", "គីមីកុំផ្លិច"];

            return (
                <div className="min-h-screen pb-12">
                    <nav className="bg-white border-b border-gray-200 sticky top-0 z-30 shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="bg-gradient-to-br from-blue-600 to-indigo-600 text-white p-2 rounded-lg shadow-md"><Icons.Beaker /></div>
                                <div className="flex flex-col">
                                    <span className="text-xl font-bold text-gray-800 brand-font">500 MCQ Formula</span>
                                    <span className="text-xs text-indigo-600 font-bold">NIE Edition (150 Formulas)</span>
                                </div>
                            </div>
                            <button onClick={startQuiz} className="flex items-center gap-2 px-4 py-2 text-sm font-bold text-orange-900 bg-orange-400 hover:bg-orange-500 rounded-full shadow-md transition-all hover:scale-105">
                                <Icons.Flame /> ធ្វើតេស្ត Quiz
                            </button>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-4 py-8">
                        <div className="mb-8 space-y-4">
                            <div className="relative max-w-2xl mx-auto md:mx-0">
                                <div className="absolute left-4 top-3.5 text-gray-400"><Icons.Search /></div>
                                <input type="text" placeholder="ស្វែងរករូបមន្ត (ឧទាហរណ៍៖ ទែម៉ូ, ម៉ូល...)" className="w-full pl-12 pr-4 py-3 rounded-xl border-2 border-gray-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/20 outline-none transition-all font-sans" 
                                    value={search} onChange={e => setSearch(e.target.value)} />
                            </div>
                            <div className="flex gap-2 overflow-x-auto pb-4 math-scroll-wrapper" style={{padding: '0 0 10px 0', textAlign: 'left'}}>
                                {categories.map(cat => (
                                    <button key={cat} onClick={() => setFilter(cat)} className={`whitespace-nowrap px-5 py-2 rounded-full text-sm font-bold shadow-sm transition-all ${filter === cat ? 'bg-indigo-600 text-white scale-105' : 'bg-white text-gray-600 border border-gray-200 hover:text-indigo-600'}`}>{cat}</button>
                                ))}
                            </div>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                            {filtered.map(item => <RecipeCard key={item.id} item={item} />)}
                        </div>
                        
                        {filtered.length === 0 && (
                            <div className="text-center py-20 text-gray-400 font-bold text-xl">
                                មិនមានរូបមន្តដែលអ្នកកំពុងស្វែងរកទេ...
                            </div>
                        )}
                    </main>

                    <QuizModal isOpen={quizOpen} onClose={() => setQuizOpen(false)} onNext={() => { setQuizOpen(false); setTimeout(startQuiz, 300); }} item={quizItem} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
